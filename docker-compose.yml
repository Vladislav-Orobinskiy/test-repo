version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: test-repo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: test-repo-web
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: testdb
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command: -c "chmod +x /app/init_data.sh && /app/init_data.sh && plackup -p 8080 app.psgi"

volumes:
  postgres_data:
